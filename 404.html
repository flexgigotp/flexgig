<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script>
    let path = window.location.pathname;
    
    // ADD THIS: ensure trailing slash so GitHub Pages finds index.html
    if (!path.endsWith('/')) path = path + '/';
    
    window.location.replace('/?path=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
